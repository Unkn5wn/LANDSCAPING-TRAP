
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title> Mower Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html,body{margin:0; padding:0; font-family: 'Segoe UI', Arial, sans-serif; background:#f0f4fa;}
    .wrapper{max-width:1300px;margin:0 auto;padding:20px 3vw 22px 3vw;}
    h1{color:#243b71;margin:24px 0 14px 0; font-size:1.7em;}
    .flexbox{display:flex; gap:38px; align-items:flex-start;}
    .maintenance-form{
      background:#fff; border-radius:13px; box-shadow:0 3px 24px #bac5e218;
      padding:28px 29px 14px 32px; width:365px; flex-shrink:0;
    }
    .maintenance-form label{font-weight:600; color:#1c336d;}
    .maintenance-form input,.maintenance-form select,.maintenance-form textarea{
      margin-bottom: 18px; font-size:1.05em; width:100%; padding:10px 8px; border-radius:6px; border:1.3px solid #d7dbf7; box-sizing: border-box; margin-top:3px; font-family:inherit;
    }
    .maintenance-form input:focus, .maintenance-form select:focus, .maintenance-form textarea:focus{outline:1.5px solid #2a5dee;}
    .maintenance-form button{
      background:#1956e5;color:#fff;padding:11px 0;border:none;font-weight:700;border-radius:7px;font-size:1.09em;width:100%;cursor:pointer;box-shadow:0 1px 8px #b3bad71c;transition:background .13s;}
    .maintenance-form button:hover{background:#162ba6;}
    .tickets-panel{flex:1;padding:0;}
    .tickets-list {flex:1 1 0;background:#fff;border-radius:13px;padding:25px 23px 15px 23px; box-shadow:0 3px 20px #b8bee918; margin-bottom:14px; min-width:340px;}
    .tickets-table{width:100%;border-collapse:collapse;}
    .tickets-table th,.tickets-table td{border-bottom:1px solid #e0e6fb; text-align:left; padding:7px 7px;}
    .tickets-table th{background:#ebeffa;color:#336;}
    .tickets-table tr.selected td{background:#ebf2fd;}
    .tickets-table tr:hover td{background:#e7ebfa;}
    .parts-panel{background:#fff;box-shadow:0px 3px 20px #b8bee91d; padding:19px 18px 15px 18px;border-radius:13px;max-width:100vw;}
    .parts-panel .p-title{font-weight:700; font-size:1.09em; margin-bottom:8px;color:#29468c;}
    .line-items-table{width:100%;border-collapse:collapse; border-radius:6px; margin-bottom:8px;}
    .line-items-table th, .line-items-table td{
      border-bottom:1px solid #e6e9f9;padding:6px 5px;text-align:left;font-size:0.97em;}
    .line-items-table th{background:#ebeffa;font-weight:600;color:#355;}
    .line-items-table input[type="text"], .line-items-table input[type="number"]{
      padding:6.5px 5px;width:100%;font-size:.98em;border-radius:4px;border:1.1px solid #d7dbf7;
    }
    .remove-line-btn{ background:#da3636; color:#fff; border:none; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:.97em;}
    .remove-line-btn:hover{background:#801b1b;}
    .add-line-row-btn{background:#237ee7;color:#fff;padding:5px 17px 5px 17px; border:none; border-radius:6px;cursor:pointer;margin-top:3px;}
    .add-line-row-btn:hover{background:#1755a3;}
    .selected-panel{
      background:#fff; border-radius:11px; box-shadow:0 1px 12px #bfcce622;
      padding:21px 27px 16px 27px; margin-top:17px;margin-bottom:11px; min-width:312px; max-width:490px;
    }
    .selected-panel label{font-weight:600;}
    .selected-panel input,.selected-panel textarea{
      margin-bottom: 10px; font-size:1.06em; width:100%; padding:10px 9px; border-radius:5px; border:1.2px solid #d7dbf7; box-sizing: border-box; margin-top:3px; font-family:inherit;
    }
    .selected-panel textarea{resize:vertical; min-height:70px;}
    .big-textarea{min-height:82px; font-size:1.05em;}
    .selected-panel .meta{font-size:.97em; color:#617bd7;margin-bottom:10px;}
    .selected-panel .delete-btn{
      background:#e02424;color:#fff;margin-top:6px;border:none;padding:10px 21px;font-weight:600;border-radius:7px;font-size:1em;cursor:pointer;box-shadow:0 1px 6px #c17d7d1a;margin-right:10px;transition:background .16s;
    }
    .selected-panel .delete-btn:hover{background:#941b1b;}
    .selected-panel button{margin-top:9px;background:#1956e5;color:#fff;padding:10px 0;border:none;font-weight:600;border-radius:7px;font-size:1em;width:140px;cursor:pointer;box-shadow:0 1px 8px #b3bad71c;margin-right:10px;}
    .selected-panel button:hover{background:#162ba6;}
    .audit-log{background:#f6f8fa;margin-top:17px;border-radius:8px;padding:10px 16px; color:#566;font-size:.97em;}
    .audit-log-entry{margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e3e8fa;}
    .audit-log-entry:last-child{border:none;}
    .success-msg{color:#1ca34e;font-weight:600;margin:5px 0;}
    .error-msg{color:#b22;margin:5px 0;}
    @media (max-width: 1200px){.wrapper{padding: 18px 1vw;}}
    @media (max-width: 900px){
      .flexbox{flex-direction:column; gap:10px;}
      .maintenance-form{width:100%;}
      .tickets-list{margin-bottom:8px;}
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>RTK Mower Maintenance Log</h1>
    <div class="flexbox">
      <form class="maintenance-form" id="log-form" autocomplete="off">
        <label for="mdate">Date</label>
        <input type="date" id="mdate" required />

        <label for="mownum">RTK Mower Number</label>
        <input list="mowernums" id="mownum" autocomplete="off" placeholder="e.g. LawnBotA" required />
        <datalist id="mowernums"></datalist>

        <label for="wo">Mechanic WO#</label>
        <input type="text" id="wo" required/>

        <label for="issues">Issue(s) with Mower</label>
        <textarea id="issues" rows="2" class="big-textarea" required></textarea>

        <label for="assignedmech">Assigned Mechanic</label>
        <input type="text" id="assignedmech" required/>

        <button type="submit" style="margin-top:17px;">Add Maintenance Ticket</button>
        <div class="success-msg" id="form-success"></div>
        <div class="error-msg" id="form-error"></div>
      </form>
      <div class="tickets-panel">
        <div class="tickets-list">
          <b>All Maintenance Tickets</b>
          <table class="tickets-table" id="tickets-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Mower #</th>
                <th>WO#</th>
                <th>Assigned Mechanic</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tickets-tbody"></tbody>
          </table>
        </div>
        <div class="parts-panel" id="parts-panel">
          <!-- Parts Line Items Editor always enabled -->
        </div>
        <div id="selected-panel"></div>
      </div>
    </div>
  </div>
  <script>
    let mowers = [{ number: 'LawnBotA' }, { number: 'LawnBotB' }, { number: 'LawnBotC' }];
    let tickets = [], selectedTicketId = null, partsLineItems = [];

    // -- Prepopulate mower datalist --
    let mowerDatalist = document.getElementById('mowernums');
    function renderMowersDatalist() {
      mowerDatalist.innerHTML = "";
      mowers.forEach(mw => {
        let opt = document.createElement('option');
        opt.value = mw.number;
        mowerDatalist.appendChild(opt);
      });
    }
    renderMowersDatalist();

    document.getElementById('mdate').valueAsDate = new Date();

    // --- PARTS PANEL: always enabled input ---
    function renderPartsPanel() {
      const panel = document.getElementById('parts-panel');
      panel.innerHTML = `
        <span class="p-title">Parts</span>
        <table class="line-items-table" id="line-items-table">
          <thead>
            <tr>
              <th>Part #</th><th>Manufacturer</th><th>Vendor</th><th>Cost</th><th>Lead Time</th><th></th>
            </tr>
          </thead>
          <tbody id="line-items-tbody"></tbody>
        </table>
        <button type="button" class="add-line-row-btn" id="add-line-btn">+ Add Part</button>
      `;
      let tbody = document.getElementById('line-items-tbody');
      tbody.innerHTML = '';
      partsLineItems.forEach((item, idx) => {
        let row = document.createElement('tr');
        row.innerHTML = `
          <td><input type="text" class="partnum" value="${item.partnum||''}" /></td>
          <td><input type="text" class="manuf" value="${item.manuf||''}" /></td>
          <td><input type="text" class="vendor" value="${item.vendor||''}" /></td>
          <td><input type="number" class="cost" step="any" value="${item.cost||''}" /></td>
          <td><input type="text" class="lead" value="${item.lead||''}" /></td>
          <td><button type="button" class="remove-line-btn" title="Remove part">&times;</button></td>
        `;
        row.querySelector('.remove-line-btn').onclick = function(){ partsLineItems.splice(idx,1); renderPartsPanel(); };
        row.querySelector('.partnum').oninput = e=>{ partsLineItems[idx].partnum = e.target.value; };
        row.querySelector('.manuf').oninput = e=>{ partsLineItems[idx].manuf = e.target.value; };
        row.querySelector('.vendor').oninput = e=>{ partsLineItems[idx].vendor = e.target.value; };
        row.querySelector('.cost').oninput = e=>{ partsLineItems[idx].cost = parseFloat(e.target.value)||""; };
        row.querySelector('.lead').oninput = e=>{ partsLineItems[idx].lead = e.target.value; };
        tbody.appendChild(row);
      });
      document.getElementById('add-line-btn').onclick = function(){
        partsLineItems.push({partnum:"",manuf:"",vendor:"",cost:"",lead:""}); renderPartsPanel();
      };
    }
    renderPartsPanel();

    // ---- FORM HANDLING ----
    document.getElementById('log-form').onsubmit = function(e) {
      e.preventDefault();
      let date = document.getElementById('mdate').value;
      let mownum = document.getElementById('mownum').value.trim();
      let wo = document.getElementById('wo').value.trim();
      let issues = document.getElementById('issues').value.trim();
      let assignedmech = document.getElementById('assignedmech').value.trim();
      let parts = partsLineItems.filter(
        li=> li.partnum || li.manuf || li.vendor || li.cost || li.lead
      );
      if(!date || !mownum || !wo || !issues || !assignedmech) {
        showFormMsg("All fields are required.","error"); return;
      }
      let id = Date.now() + Math.floor(Math.random()*10000);
      tickets.unshift({
        id, date, mownum, wo, issues, assignedmech,
        status: "Opened",
        mechanicNotes: "",
        parts: parts,
        eta: "",
        auditLog: [{ by: assignedmech, type:"created", at: new Date().toISOString(), changes: "Ticket created" }]
      });
      if (!mowers.some(m=>m.number===mownum)) {
        mowers.push({number:mownum}); renderMowersDatalist();
      }
      this.reset();
      partsLineItems = [];
      renderPartsPanel();
      document.getElementById('form-success').textContent = "Ticket added! Parts cleared for next entry.";
      setTimeout(()=>{document.getElementById('form-success').textContent=''},1200);
      renderTicketsTable();
    };
    function showFormMsg(msg,kind) {
      document.getElementById('form-'+(kind||'error')).textContent = msg;
      setTimeout(()=>{document.getElementById('form-'+(kind||'error')).textContent=''},2500);
    }

    // -- TICKETS TABLE --
    function renderTicketsTable() {
      let tbody = document.getElementById('tickets-tbody');
      tbody.innerHTML = "";
      tickets.forEach((tk, idx) => {
        let tr = document.createElement('tr');
        if (selectedTicketId === tk.id) tr.className = "selected";
        tr.innerHTML = `<td>${tk.date}</td>
          <td>${tk.mownum}</td>
          <td>${tk.wo}</td>
          <td>${tk.assignedmech}</td>
          <td>${tk.status||""}</td>`;
        tr.onclick = () => {
          selectedTicketId = tk.id;
          renderTicketsTable();
          renderSelectedPanel();
        };
        tbody.appendChild(tr);
      });
      renderSelectedPanel();
    }

    // -- TICKET DETAILS PANEL FOR MECHANIC INTERFACE
    function renderSelectedPanel() {
      let div = document.getElementById('selected-panel');
      let ticket = tickets.find(t=>t.id===selectedTicketId);
      if (!ticket) { div.innerHTML = ""; return; }
      let deleted = !!ticket.deleted;
      div.innerHTML = `
        <b style="font-size:1.08em;">Ticket Details</b>
        <div class="meta">WO#: <b>${ticket.wo}</b> — Date: <b>${ticket.date}</b> — Mower: <b>${ticket.mownum}</b></div>
        <div><label>Assigned Mechanic:</label> <span>${ticket.assignedmech}</span></div>
        <div><label>Reported Problem:</label>
          <div style="background:#f9fdff;padding:5px 9px 5px 9px; border-radius:4px; border:1px solid #ddeafa; margin-bottom:13px;">${ticket.issues}</div>
        </div>
        <div><label>Parts Used:</label>
          <table class="line-items-table" style="width:100%;">
            <thead><tr>
              <th>Part #</th><th>Manufacturer</th><th>Vendor</th><th>Cost</th><th>Lead Time</th>
            </tr></thead>
            <tbody>
              ${ (ticket.parts||[]).map(li=>`<tr>
                <td>${li.partnum||""}</td>
                <td>${li.manuf||""}</td>
                <td>${li.vendor||""}</td>
                <td>${li.cost!==undefined? li.cost : ""}</td>
                <td>${li.lead||""}</td>
              </tr>`).join("") }
              ${!ticket.parts?.length?'<tr><td colspan="5" style="color:#999;">None</td></tr>':''}
            </tbody>
          </table>
        </div>
        <form id="mech-updateform">
          <label for="mechnotes">Diagnosis/Mechanic's Notes</label>
          <textarea id="mechnotes" class="big-textarea" rows="5" ${deleted ? "disabled" : ""}>${ticket.mechanicNotes||""}</textarea>
          <label for="eta">Estimated Time to Fix</label>
          <textarea id="eta" class="big-textarea" rows="3" ${deleted ? "disabled" : ""}>${ticket.eta||""}</textarea>
          ${deleted ? "" : '<button type="submit">Save Update</button>'}
        </form>
        ${deleted?'<div style="color:#b22;font-weight:600;margin-top:13px;">This ticket was deleted. See log for details.</div>':`
          <button class="delete-btn" id="delete-ticket-btn" type="button">Delete Ticket</button>
        `}
        <div class="audit-log">
          <b>Audit Log</b>
          ${ticket.auditLog.map(log=>(
            `<div class="audit-log-entry"><span style="color:#1459bf">${log.by||"?"}</span> <b>${log.type}</b> <span style="color:#444">${new Date(log.at).toLocaleString()}</span><div style="color:#435;"><i>${log.changes}</i></div></div>`
          )).join("")}
        </div>
      `;
      if (!deleted) {
        document.getElementById('mech-updateform').onsubmit = function(ev){
          ev.preventDefault();
          let notes = document.getElementById('mechnotes').value.trim(),
              eta = document.getElementById('eta').value.trim(),
              changes = [];
          if(notes!==ticket.mechanicNotes) changes.push(`Notes: "${ticket.mechanicNotes||'-'}"→"${notes}"`);
          if(eta!==ticket.eta) changes.push(`ETA: "${ticket.eta||'-'}"→"${eta}"`);
          if(!changes.length) return;
          ticket.mechanicNotes = notes; ticket.eta=eta;
          ticket.status = (eta&&eta.toLowerCase().includes("done")) ? "Closed":"Active";
          ticket.auditLog.push({
            by: ticket.assignedmech||"?", type: "mechanic-update", at: new Date().toISOString(), changes: changes.join(", ")
          });
          renderSelectedPanel(); renderTicketsTable();
        };
        document.getElementById('delete-ticket-btn').onclick = function() {
          let reason = prompt("Why are you deleting this WO ticket? (Reason will be logged)");
          if(!reason){ alert('Deletion cancelled. You must enter a reason.'); return;}
          ticket.deleted = true;
          ticket.status = "Deleted";
          ticket.auditLog.push({
            by: ticket.assignedmech||"?",
            type: "deleted",
            at: new Date().toISOString(),
            changes: `Ticket deleted. Reason: ${reason}`
          });
          renderTicketsTable();
          renderSelectedPanel();
        };
      }
    }
    renderPartsPanel();
    renderTicketsTable();
  </script>
</body>
</html>
